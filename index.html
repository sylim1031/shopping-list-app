<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 24px 28px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .card-header .summary {
      font-size: .85rem;
      opacity: .75;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background .15s;
      line-height: 1;
    }

    .input-row button:hover { background: #4338ca; }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 14px 20px 0;
    }

    .filter-row button {
      border: 1.5px solid #e2e8f0;
      background: #fff;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .8rem;
      cursor: pointer;
      color: #64748b;
      transition: all .15s;
    }

    .filter-row button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 14px 20px 8px;
      min-height: 60px;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background .1s;
      cursor: pointer;
    }

    .list li:hover { background: #f8fafc; }

    .list li.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .list li.checked .checkbox {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .checkbox::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity .15s;
    }

    .list li.checked .checkbox::after { opacity: 1; }

    .item-text {
      flex: 1;
      font-size: .95rem;
      color: #1e293b;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all .15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: .9rem;
      padding: 32px 0;
    }

    .card-footer {
      border-top: 1px solid #f1f5f9;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8rem;
      color: #94a3b8;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: .8rem;
      cursor: pointer;
      padding: 2px 0;
      opacity: .7;
    }

    .clear-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="summary" id="summary">항목 없음</div>
    </div>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 추가..." maxlength="60" />
      <button id="add-btn" title="추가">+</button>
    </div>

    <div class="filter-row">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">미완료</button>
      <button data-filter="checked">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="card-footer">
      <span id="footer-count"></span>
      <button class="clear-btn" id="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-list-v1';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let filter = 'all';

    const listEl = document.getElementById('list');
    const input = document.getElementById('item-input');
    const summaryEl = document.getElementById('summary');
    const footerCountEl = document.getElementById('footer-count');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      const visible = items.filter(it =>
        filter === 'all' ? true :
        filter === 'checked' ? it.checked :
        !it.checked
      );

      listEl.innerHTML = '';

      if (visible.length === 0) {
        listEl.innerHTML = `<li class="empty">${filter === 'checked' ? '완료된 항목이 없어요' : '항목을 추가해보세요'}</li>`;
      } else {
        visible.forEach(it => {
          const li = document.createElement('li');
          li.className = it.checked ? 'checked' : '';
          li.dataset.id = it.id;
          li.innerHTML = `
            <div class="checkbox"></div>
            <span class="item-text">${escapeHtml(it.text)}</span>
            <button class="delete-btn" title="삭제">✕</button>
          `;
          li.querySelector('.delete-btn').addEventListener('click', e => {
            e.stopPropagation();
            items = items.filter(i => i.id !== it.id);
            save(); render();
          });
          li.addEventListener('click', () => {
            const target = items.find(i => i.id === it.id);
            if (target) { target.checked = !target.checked; save(); render(); }
          });
          listEl.appendChild(li);
        });
      }

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      summaryEl.textContent = total === 0 ? '항목 없음' : `${done} / ${total} 완료`;
      footerCountEl.textContent = `완료 ${done}개`;
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ id: Date.now(), text, checked: false });
      input.value = '';
      save(); render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('add-btn').addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    document.querySelector('.filter-row').addEventListener('click', e => {
      const btn = e.target.closest('button[data-filter]');
      if (!btn) return;
      document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save(); render();
    });

    render();
  </script>
</body>
</html>
